name: Apple Stock Monitor

on:
  schedule:
    # Every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  check-stock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: .state
          key: apple-monitor-state-${{ github.run_id }}
          restore-keys: |
            apple-monitor-state-

      - name: Run monitor
        env:
          APPLE_MONITOR_TG_TOKEN: ${{ secrets.APPLE_MONITOR_TG_TOKEN }}
          APPLE_MONITOR_TG_CHAT: ${{ secrets.APPLE_MONITOR_TG_CHAT }}
        run: python3 monitor.py
